  image: 'posters/SBMC2026_Poster_Albadry2026.jpg'
  authors: 'Mohamed Albadry<sup>1,2</sup>, <b>Matthias König<sup>3,4</sup></b>, Fangcong Li<sup>1</sup>, Karl-Heinz Herrmann<sup>5</sup>, Wan-Ting Zhao<sup>5</sup>, Weiwei Wei<sup>1,6</sup>, Joanna Kosacka<sup>1,7</sup>, Xin Pei<sup>1</sup>, FengMing Xu<sup>1,8,9</sup>, Mohamed I. A Hassan<sup>1</sup>, Michael Kiehntopf<sup>10</sup>, Amelie Lupp<sup>11</sup>, Michael Böttcher<sup>12</sup>, Jasna Neumann<sup>12</sup>, Sebastian Höpfl<sup>13</sup>, Nicole Radde<sup>13,14</sup>, Olaf Dirsch<sup>15</sup>, Utz Settmacher<sup>1,6</sup>, Jürgen R. Reichenbach<sup>3</sup>, Hans-Michael Tautenhahn<sup>1,16</sup>, Uta Dahmen<sup>1</sup>'
  affiliations: '<sup>1</sup>Experimental Transplantation Surgery, Department of General, Visceral and Vascular Surgery, Jena University Hospital, Friedrich Schiller University Jena, Jena, Germany; <sup>2</sup>Department of Pathology, Faculty of Veterinary Medicine, Menoufia University, Shebin El Kom, Egypt; <sup>3</sup>Institute of Structural Mechanics and Dynamics in Aerospace Engineering, University of Stuttgart, Stuttgart, Germany; <sup>4</sup>Institute for Biology, Faculty of Life Science, Humboldt-Universität zu Berlin, Berlin, Germany; <sup>5</sup>Medical Physics Group, Institute of Diagnostic and Interventional Radiology, Jena University Hospital, Friedrich Schiller University Jena, Jena, Germany; <sup>6</sup>Department of General, Visceral and Vascular Surgery, Jena University Hospital, Friedrich Schiller University Jena, Jena, Germany; <sup>7</sup>Department of Neurology, University of Leipzig, Leipzig, Germany; <sup>8</sup>Department of Infectious Diseases, The First Affiliated Hospital of Zhejiang Chinese Medical University, Hangzhou 310006, China; <sup>9</sup>Else Kröner Graduate School for Medical Students “JSAM”, Jena University Hospital, Jena, Germany; <sup>10</sup>Department of Clinical Chemistry and Laboratory Diagnostics and Integrated Biobank Jena (IBBJ), Jena University Hospital - Friedrich Schiller University Jena, Jena, Germany; <sup>11</sup>Institute of Pharmacology and Toxicology, Jena University Hospital, Friedrich Schiller University Jena, Jena, Germany; <sup>12</sup>MVZ Medizinische Labore Dessau Kassel GmbH, Bauhüttenstraße 6, 06847, Dessau-Roßlau, Germany; <sup>13</sup>Institute for Systems Theory and Automatic Control, Faculty of Engineering Design, Production Engineering and Automotive Engineering, University of Stuttgart, Stuttgart, Germany; <sup>14</sup>Institute for Stochastics and Applications, University of Stuttgart, Stuttgart, Germany; <sup>15</sup>BG Klinikum Unfallkrankenhaus Berlin, Institute of Pathology, Berlin, Germany; <sup>16</sup>Department of Visceral, Transplantation, Thoracic and Vascular Surgery, University of Leipzig Medical Center, Leipzig, Germany'
  title: 'Modelling of Patient-Specific Liver Vasculature and Sorafenib Pharmacokinetics in Hepatocellular Carcinoma'
  meeting: 'SBMC 2026: 10th Conference on Systems Biology of Mammalian Cells'
  webpage: 'https://www.lisym-cancer.org/sbmc2026'
  doi:
  keywords:
    - liver
    - perfusion
  project:
  repository:
  abstract: 'Background: Liver function relies on the balance between blood flow distribution and cellular resilience. While ischemia and perfusion are often studied separately, their combined contribution to multi-scale liver adaptation remains poorly understood. This study applies a systems-level approach to link macro-hemodynamics with cellular responses. Methods: Two complementary models were used to investigate distinct system drivers. (1) In vivo, portal vein ligation (PVL) generated intra-organ perfusion gradients. Regional adaptation was assessed by MRI-based perfusion, volumetry, proliferation (Ki67), cytochrome P450 expression, and drug elimination kinetics. (2) Ex vivo, normothermic machine perfusion (NMP) was performed under standardized flow conditions to evaluate the impact of different ischemic durations, assessing bile production, HMGB1 release, and markers of cellular homeostasis. Results: PVL induced divergent regional responses: ligated lobes exhibited hypoperfusion, atrophy, and reduced proliferation, whereas non-ligated lobes showed hyperperfusion, hypertrophy, and increased proliferation. These structural changes were accompanied by distinct alterations in cytochrome P450 expression and corresponding differences in drug elimination. In NMP, functional recovery depended on ischemic burden despite comparable flow conditions. Moderate ischemia (30 min) was associated with adaptive response and preserved bile production, whereas severe ischemia (50 min) resulted in impaired function and increased HMGB1 release. Preliminary data suggest a link between these transitions and autophagic activity. Conclusion: Liver adaptation can be conceptualized along two interacting axes: a spatial axis driven by perfusion redistribution and a temporal axis defined by ischemic burden. Integrating these models provides a framework linking structural remodeling and functional resilience, with autophagy as a potential regulatory node.'

- id: 'EASL2026_LCS_Poster'
  year: 2025
  date: 2025-02-21
  pdf: 'posters/EASL2026_LCS_Poster.pdf'
  image: 'posters/EASL2026_LCS_Poster.jpg'
  authors: 'Mariia Myshkina<sup>1</sup>, Etienne Jessen<sup>2</sup>, Dominik Schillinger<sup>2</sup>, <b>Matthias König</b><sup>1,3</sup>'
  affiliations: '<sup>1</sup> Department of Biology, Faculty of Life Sciences, Humboldt-Universität zu Berlin, Germany; <sup>2</sup> Institute for Mechanics, Computational Mechanics Group, Technical University of Darmstadt, Darmstadt, Germany; <sup>3</sup> Institute of Structural Mechanics and Dynamics in Aerospace Engineering, University of Stuttgart, Stuttgart, Germany'
  title: 'Modelling of Patient-Specific Liver Vasculature and Sorafenib Pharmacokinetics in Hepatocellular Carcinoma'
  meeting: 'EASL Liver Cancer Summit 2026'
  webpage: 'https://easl.eu/event/liver-cancer-summit-2026/'
  doi:
  keywords:
    - pharmacokinetics
    - sorafenib
    - vessel trees
  project:
  repository:
  abstract: 'Background and Aims: Liver cancer is the second leading cause of cancer-related deaths. Despite the various therapeutic options for hepatocellular carcinoma (HCC) treatment, selecting patient-specific therapy remains challenging. A major challenge is predicting the distribution and heterogeneity of anti-cancer medication in the liver due to factors such as liver anatomy, vascular topology, perfusion and tumour location. In this study, we applied a recently published algorithm [1] to generate vessel trees within a defined liver volume and modelled the spatio-temporal pharmacokinetics of the multi-kinase inhibitor sorafenib (NEXAVAR®) within the liver. Our objectives were: (i) to generate physiologically realistic arterial, portal, venous, and biliary vessel trees in a given liver volume; (ii) to develop a mechanistic pharmacokinetic model for substance transport in these trees; (iii) to couple this model with a physiologically based pharmacokinetic (PBPK) model of sorafenib; and (iv) to simulate drug concentration dynamics within the liver.
  Methods: Substance transport along the vessel and biliary trees was modelled using ordinary differential equations. Each terminal segment of the trees was associated with a terminal liver volume, representing the hepatic tissue supplied by individual terminal arterial, portal, venous, and biliary segments. In each terminal volume, the local sorafenib metabolism and biliary excretion were modelled. Model performance was evaluated using published pharmacokinetic data.
  Results: The algorithm successfully generated physiologically realistic, non-intersecting arterial, portal, venous, and biliary trees within the liver volume. The surrogate mechanistic–PBPK model reproduced published pharmacokinetic data for sorafenib and enabled spatially resolved predictions of drug concentrations along the vascular and biliary trees and within liver tissue. 
  Simulations revealed that the time to reach maximum sorafenib concentration in liver tissue was directly related to proximity to the start of inflow trees and inversely to proximity to the end of outflow trees. These results underscore the influence of the liver anatomy, its vascularisation topology and target location on intrahepatic drug exposure, suggesting that individualised dosing strategies could enhance therapeutic response in HCC.
  Conclusion: The established workflow for simulating the spatial distribution and heterogeneity of anti-cancer medication in a given liver anatomy can provide important information for individual HCC treatment planning.
  References
  [1] Jessen E, Steinbach MC, Debbaut C, Schillinger D (2022). Rigorous mathematical optimization of synthetic hepatic vascular trees. Journal of The Royal Society Interface 19:20220087. doi: 10.1098/rsif.2022.0087
  [2] Okibedi Frances, & König, Matthias. (2023). Physiologically based pharmacokinetic (PBPK) model of sorafenib. Zenodo. https://doi.org/10.5281/zenodo.10432855'


